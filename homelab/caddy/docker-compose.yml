services:
  docker-socket-proxy:
    image: ghcr.io/tecnativa/docker-socket-proxy:latest
    restart: unless-stopped
    networks:
      - caddy-docker-api
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      CONTAINERS: "1"
      EVENTS: "1"
      INFO: "1"
      NETWORKS: "1"
      PING: "1"
      POST: "0"
      SERVICES: "1"
      TASKS: "1"
      VERSION: "1"

  caddy:
    image: lucaslorentz/caddy-docker-proxy:ci
    restart: unless-stopped
    depends_on:
      - docker-socket-proxy
    ports:
      - "80:80"
      - "443:443/tcp"
      - "443:443/udp"
    environment:
      CADDY_INGRESS_NETWORKS: proxy-tier
      DOCKER_HOST: tcp://docker-socket-proxy:2375
    networks:
      - caddy-docker-api
      - proxy-tier
    volumes:
      - caddy-data:/data
      - caddy-config:/config

volumes:
  caddy-data:
  caddy-config:

networks:
  caddy-docker-api:
    internal: true
  proxy-tier:
    external: true
