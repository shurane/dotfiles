services:
  caddy:
    image: lucaslorentz/caddy-docker-proxy:2.12.1-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443/tcp"
      - "443:443/udp"
    environment:
      CADDY_INGRESS_NETWORKS: proxy-tier
    networks:
      - proxy-tier
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  caddy-data:
  caddy-config:

networks:
  proxy-tier:
    external: true
