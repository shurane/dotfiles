services:
  withings-sync:
    image: ghcr.io/jaroslawhartman/withings-sync:latest
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./config:/config
      - ./entrypoint.sh:/home/withings-sync/entrypoint.sh:ro
      - ./run-sync:/home/withings-sync/run-sync:ro
    entrypoint: ["sh", "/home/withings-sync/entrypoint.sh"]
